<svg width="1200" height="460" viewBox="0 0 1200 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Go2 blind rough-terrain asymmetric PPO deployment</title>
  <desc id="desc">A stylized banner showing the IsaacLab to MuJoCo to real Go2 deployment pipeline.</desc>
  <defs>
