      <stop offset="0" stop-color="#08130F"/>
      <stop offset="0.52" stop-color="#10251D"/>
      <stop offset="1" stop-color="#1C2D24"/>
    </linearGradient>
    <linearGradient id="terrain" x1="52" y1="360" x2="1144" y2="292" gradientUnits="userSpaceOnUse">
